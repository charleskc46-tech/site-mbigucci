<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Mbigucci</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { margin-bottom: 30px; text-align: center; }
    .login-box {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      margin: 100px auto;
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 8px;
      background: #333;
      color: white;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #D32F2F;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #b71c1c; }
    .hidden { display: none; }
    .link-item {
      background: #2a2a2a;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }
    .link-item input {
      margin-bottom: 10px;
    }
    .link-item button {
      width: auto;
      padding: 8px 15px;
      background: #444;
      font-size: 0.9rem;
    }
    .link-item button.delete {
      background: #c62828;
      float: right;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .actions button { flex: 1; }
    .add-btn { background: #2e7d32; margin-bottom: 20px; }
    .back {
      display: inline-block;
      margin-bottom: 20px;
      color: #D32F2F;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Tela de Login -->
    <div id="login-screen" class="login-box">
      <h2>🔐 Área Administrativa</h2>
      <p style="margin: 15px 0; color: #aaa;">Digite a senha para continuar</p>
      <input type="password" id="password" placeholder="Senha">
      <button onclick="login()">Entrar</button>
    </div>

    <!-- Tela de Edição -->
    <div id="admin-screen" class="hidden">
      <a href="/" class="back">← Voltar ao site</a>
      <h1>Gerenciar Links</h1>
      
      <button class="add-btn" onclick="addLink()">+ Adicionar Link</button>
      
      <div id="links-list"></div>
      
      <div class="actions">
        <button onclick="saveLinks()">💾 Salvar Alterações</button>
      </div>
    </div>
  </div>

  <script>
    let links = [];

    function login() {
      const pass = document.getElementById('password').value;
      if (pass === 'mbigucci2026') {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('admin-screen').classList.remove('hidden');
        loadLinks();
      } else {
        alert('Senha incorreta!');
      }
    }

    function loadLinks() {
      fetch('/api/links')
        .then(r => r.json())
        .then(data => {
          links = data;
          renderLinks();
        });
    }

    function renderLinks() {
      const container = document.getElementById('links-list');
      if (links.length === 0) {
        container.innerHTML = '<p style="color: #888; text-align: center;">Nenhum link cadastrado</p>';
        return;
      }
      container.innerHTML = links.map((link, index) => `
        <div class="link-item">
          <input type="text" placeholder="Título" value="${link.title}" 
                 onchange="updateLink(${index}, 'title', this.value)">
          <input type="text" placeholder="URL (https://...)" value="${link.url}" 
                 onchange="updateLink(${index}, 'url', this.value)">
          <input type="text" placeholder="Ícone (emoji)" value="${link.icon || '🔗'}" 
                 onchange="updateLink(${index}, 'icon', this.value)">
          <button class="delete" onclick="deleteLink(${index})">🗑️ Excluir</button>
        </div>
      `).join('');
    }

    function addLink() {
      links.push({ title: '', url: '', icon: '🔗' });
      renderLinks();
    }

    function updateLink(index, field, value) {
      links[index][field] = value;
    }

    function deleteLink(index) {
      if (confirm('Excluir este link?')) {
        links.splice(index, 1);
        renderLinks();
      }
    }

    function saveLinks() {
      fetch('/api/links', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          password: 'mbigucci2026',
          links: links
        })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          alert('✅ Salvo com sucesso!');
        } else {
          alert('❌ Erro ao salvar');
        }
      });
    }
  </script>
</body>
</html>
