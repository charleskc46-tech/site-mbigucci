<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mbigucci | Links</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #D32F2F 0%, #8B0000 100%);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo {
      width: 100%;
      max-width: 400px;
      margin-bottom: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 18px 24px;
      border-radius: 12px;
      text-decoration: none;
      color: white;
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .link-card:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .icon { font-size: 1.5rem; }
    .title { font-weight: 600; font-size: 1.1rem; flex: 1; }
    .arrow { opacity: 0.7; }
    .loading {
      text-align: center;
      color: rgba(255,255,255,0.8);
      padding: 20px;
    }
    footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
      text-align: center;
    }
    .admin-link {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 45px;
      height: 45px;
      background: rgba(0,0,0,0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <img src="logo.png" alt="Mbigucci" class="logo">
  
  <div class="container" id="links-container">
    <div class="loading">Carregando...</div>
  </div>
  
  <footer>© 2026 Mbigucci Construtora</footer>
  
  <a href="/admin" class="admin-link">⚙️</a>

  <script>
    fetch('/api/links')
      .then(r => r.json())
      .then(links => {
        const container = document.getElementById('links-container');
        if (links.length === 0) {
          container.innerHTML = '<div class="loading">Nenhum link cadastrado</div>';
          return;
        }
        container.innerHTML = links.map(link => `
          <a href="${link.url}" class="link-card" target="_blank">
            <span class="icon">${link.icon || '🔗'}</span>
            <span class="title">${link.title}</span>
            <span class="arrow">→</span>
          </a>
        `).join('');
      })
      .catch(() => {
        document.getElementById('links-container').innerHTML = 
          '<div class="loading">Erro ao carregar</div>';
      });
  </script>
</body>
</html>
